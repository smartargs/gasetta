<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A continuous AI-summarised stream of Neo's GitHub — issues, PRs, discussions, founder activity." />
    <title>Gasetta — Neo's GitHub stream</title>
    <!-- Open Graph / Twitter — overridden per-thread via usePageMeta hook
         on routes that warrant it. SPA crawler caveat: bots that don't run
         JS only see this default set. For real per-link previews we'd need
         SSR or a prerender. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Gasetta" />
    <meta property="og:title" content="Gasetta — Neo's GitHub stream" />
    <meta property="og:description" content="A continuous AI-summarised stream of Neo's GitHub — issues, PRs, discussions, founder activity." />
    <meta property="og:url" content="https://www.gasetta.com/" />
    <meta property="og:image" content="https://www.gasetta.com/favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Gasetta — Neo's GitHub stream" />
    <meta name="twitter:description" content="A continuous AI-summarised stream of Neo's GitHub — issues, PRs, discussions, founder activity." />
    <meta name="twitter:image" content="https://www.gasetta.com/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..800;1,8..60,300..800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
