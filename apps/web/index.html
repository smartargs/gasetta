<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A continuous AI-summarised stream of Neo's GitHub — issues, PRs, discussions, founder activity." />
    <title>Gasetta — Neo's GitHub stream</title>
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Gasetta" />
    <meta property="og:title" content="Gasetta — Neo's GitHub stream" />
    <meta property="og:description" content="A continuous AI-summarised stream of Neo's GitHub — issues, PRs, discussions, founder activity." />
    <meta property="og:url" content="https://www.gasetta.com/" />
    <meta property="og:image" content="https://www.gasetta.com/favicon.svg" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Gasetta — Neo's GitHub stream" />
    <meta name="twitter:description" content="A continuous AI-summarised stream of Neo's GitHub — issues, PRs, discussions, founder activity." />
    <meta name="twitter:image" content="https://www.gasetta.com/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..800;1,8..60,300..800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    />
    <style>
      html, body { margin: 0; padding: 0; background: #FBFAF7; }
      #initial-splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #FBFAF7;
        color: #1A1814;
        font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif;
        z-index: 1;
      }
      #initial-splash .mark {
        font-size: 64px;
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 1;
      }
      #initial-splash .mark .g { color: #00955C; }
      #initial-splash .sub {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 13px;
        color: #6A6862;
        letter-spacing: 0.02em;
      }
      #initial-splash .bar {
        position: relative;
        width: 120px;
        height: 2px;
        margin-top: 6px;
        background: #ECEAE2;
        border-radius: 2px;
        overflow: hidden;
      }
      #initial-splash .bar::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, #00955C, transparent);
        transform: translateX(-100%);
        animation: splash-slide 1.4s ease-in-out infinite;
      }
      @keyframes splash-slide {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-splash">
        <div class="mark"><span class="g">G</span><span>a</span></div>
        <div class="sub">Neo's GitHub stream</div>
        <div class="bar" aria-hidden="true"></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
